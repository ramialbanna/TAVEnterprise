name = "tav-intelligence-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# workers_dev disabled until Rami flips this on at first deploy time.
workers_dev = false

# ── KV: per-environment namespaces, all separate from the main worker ─────────
#
# Decision (locked 2026-05-07): each environment has its own KV namespace.
# The default block is used by `wrangler dev`; staging and production each
# have their own block below. Do NOT share IDs across envs.
#
# Provisioning (Rami runs these once, then pastes the returned IDs back here):
#
#   wrangler kv namespace create TAV_INTEL_KV_PREVIEW \
#     --config workers/tav-intelligence-worker/wrangler.toml
#
#   wrangler kv namespace create TAV_INTEL_KV_STAGING \
#     --config workers/tav-intelligence-worker/wrangler.toml --env staging
#
#   wrangler kv namespace create TAV_INTEL_KV_PRODUCTION \
#     --config workers/tav-intelligence-worker/wrangler.toml --env production
#
# Each command prints an `id`. Replace the placeholders below.
# Deploying with placeholder IDs binds to a non-existent namespace; every KV
# op fails at runtime.

[[kv_namespaces]]
binding = "TAV_INTEL_KV"
id         = "1b19d3c13a5e4b9c95f7a9c6aa4161ae"
preview_id = "1b19d3c13a5e4b9c95f7a9c6aa4161ae"

[vars]
# Comma-separated email allowlist for force_refresh (temporary; see
# docs/03-api/intelligence-contracts.md §D). Empty string = no email-based bypass.
MANAGER_EMAIL_ALLOWLIST = ""

# ── Staging ──────────────────────────────────────────────────────────────────

[env.staging]
name = "tav-intelligence-worker-staging"
workers_dev = true

[[env.staging.kv_namespaces]]
binding = "TAV_INTEL_KV"
id      = "80195f01a65c4431af1e3835f9bea933"

[env.staging.vars]
MANAGER_EMAIL_ALLOWLIST = ""
# Phase 4 — Cox historical + forecast includes on MMR lookups (smoke on staging first).
MANHEIM_INCLUDE_HISTORICAL = "true"
MANHEIM_INCLUDE_FORECAST = "true"
# Cox retail tier — requires retail entitlement on the TAV API key.
# Enables Estimated Retail Value + Typical Range in the MMR Lab result band.
MANHEIM_INCLUDE_RETAIL = "true"
# Cox client_credentials config — not credentials, committed as vars so they can
# never go missing after a deploy. Values are the same across all environments.
MANHEIM_API_VENDOR   = "cox"
MANHEIM_GRANT_TYPE   = "client_credentials"
MANHEIM_SCOPE        = "wholesale-valuations.vehicle.mmr-ext.get"
# Staging uses the Cox integration endpoint.
MANHEIM_MMR_URL      = "https://integration.api.coxautoinc.com/wholesale-valuations/vehicle/mmr"
# INTEL_SERVICE_SECRET must be set as a Cloudflare secret:
#   wrangler secret put INTEL_SERVICE_SECRET --config workers/tav-intelligence-worker/wrangler.toml --env staging
# MANHEIM_CLIENT_ID + MANHEIM_CLIENT_SECRET must be set as Cloudflare secrets (actual credentials).
# MANHEIM_TOKEN_URL must be set as a Cloudflare secret (contains the per-app OAuth server ID):
#   wrangler secret put MANHEIM_TOKEN_URL --config workers/tav-intelligence-worker/wrangler.toml --env staging

# ── Production ───────────────────────────────────────────────────────────────

[env.production]
name = "tav-intelligence-worker-production"
# Public URL disabled at steady state. Service Binding from
# tav-aip-production (env.INTEL_WORKER) is the only access path. To
# re-enable for ad-hoc direct smoke, set workers_dev = true here and
# redeploy; revert after smoke for tightest prod hygiene.

[[env.production.kv_namespaces]]
binding = "TAV_INTEL_KV"
id      = "ada5f91d77b24ff0966fb3032bb56b94"

[env.production.vars]
MANAGER_EMAIL_ALLOWLIST = ""
# Phase 4 — enable after staging smoke validates Cox historical/forecast payloads.
MANHEIM_INCLUDE_HISTORICAL = "true"
MANHEIM_INCLUDE_FORECAST = "true"
# Cox retail tier — requires retail entitlement on the TAV API key.
# Enables Estimated Retail Value + Typical Range in the MMR Lab result band.
MANHEIM_INCLUDE_RETAIL = "true"
# Cox client_credentials config — not credentials, committed as vars so they can
# never go missing after a deploy. Values are the same across all environments.
MANHEIM_API_VENDOR   = "cox"
MANHEIM_GRANT_TYPE   = "client_credentials"
MANHEIM_SCOPE        = "wholesale-valuations.vehicle.mmr-ext.get"
# Production Cox Storefront MMR base URL (see docs/03-api/manheim-cox.md).
MANHEIM_MMR_URL      = "https://api.coxautoinc.com/wholesale-valuations/vehicle/mmr"

# ── Secrets (set before first deploy — credentials only) ─────────────────────
#
# These are the ONLY values that must be manually set as secrets.
# Everything else is committed above as [vars].
#
# Per environment (run for both --env staging and --env production):
#
#   wrangler secret put INTEL_SERVICE_SECRET  --config workers/tav-intelligence-worker/wrangler.toml --env production
#   wrangler secret put SUPABASE_URL          --config workers/tav-intelligence-worker/wrangler.toml --env production
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY --config workers/tav-intelligence-worker/wrangler.toml --env production
#   wrangler secret put MANHEIM_CLIENT_ID     --config workers/tav-intelligence-worker/wrangler.toml --env production
#   wrangler secret put MANHEIM_CLIENT_SECRET --config workers/tav-intelligence-worker/wrangler.toml --env production
#   wrangler secret put MANHEIM_TOKEN_URL     --config workers/tav-intelligence-worker/wrangler.toml --env production
#     ↑ MANHEIM_TOKEN_URL contains the per-app OAuth server ID — copy verbatim
#       from the Cox app detail page. Format:
#       https://authorize.coxautoinc.com/oauth2/<authServerId>/v1/token


