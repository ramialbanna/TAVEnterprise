name: web-ci

on:
  push:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: lint / build / typecheck / test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      # Build runs before typecheck so `typedRoutes: true` can emit `.next/types/**`.
      # Without it, `tsc --noEmit` fails on `<Link href>` / `redirect()` to app routes
      # because the generated `RouteImpl<...>` types do not exist yet on a clean checkout.
      # Placeholder build-time env so `next build` + `serverEnv()` stay strict but don't
      # fail in CI — these are NOT real credentials and the build exercises no live calls.
      - run: pnpm build
        env:
          APP_API_BASE_URL: https://tav-aip-staging.rami-1a9.workers.dev
          APP_API_SECRET: ci
          AUTH_SECRET: ci
          AUTH_GOOGLE_ID: ci
          AUTH_GOOGLE_SECRET: ci
          ALLOWED_EMAIL_DOMAIN: texasautovalue.com

      - run: pnpm typecheck

      - run: pnpm test
