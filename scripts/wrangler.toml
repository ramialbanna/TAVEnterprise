# Cloudflare Worker config — TAV Normalizer
# Deploy:  wrangler deploy
# Tail:    wrangler tail
#
# Secrets (set once via `wrangler secret put <NAME>`):
#   NORMALIZER_SECRET          — shared bearer token (also stored in Make Connections)
#   MANHEIM_CLIENT_ID          — Mashery API key
#   MANHEIM_CLIENT_SECRET      — Mashery API secret
#   SUPABASE_URL               — https://<ref>.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  — for upsert_mmr_async writeback
#
# Account ID: wrangler reads $CLOUDFLARE_ACCOUNT_ID from the environment
# automatically — set by setup.sh before deploy, no need to hardcode here.

name = "tav-normalizer"
main = "normalizer-worker.js"
compatibility_date = "2026-04-01"

# No KV, R2, or D1 bindings needed — Worker is stateless.

[vars]
MANHEIM_ENV = "prod"

# Observability — keeps last 7d of logs at no extra cost
[observability]
enabled = true
