name = "tav-intelligence-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# workers_dev disabled until Rami flips this on at first deploy time.
workers_dev = false

# ── KV: per-environment namespaces, all separate from the main worker ─────────
#
# Decision (locked 2026-05-07): each environment has its own KV namespace.
# The default block is used by `wrangler dev`; staging and production each
# have their own block below. Do NOT share IDs across envs.
#
# Provisioning (Rami runs these once, then pastes the returned IDs back here):
#
#   wrangler kv namespace create TAV_INTEL_KV_PREVIEW \
#     --config workers/tav-intelligence-worker/wrangler.toml
#
#   wrangler kv namespace create TAV_INTEL_KV_STAGING \
#     --config workers/tav-intelligence-worker/wrangler.toml --env staging
#
#   wrangler kv namespace create TAV_INTEL_KV_PRODUCTION \
#     --config workers/tav-intelligence-worker/wrangler.toml --env production
#
# Each command prints an `id`. Replace the placeholders below.
# Deploying with placeholder IDs binds to a non-existent namespace; every KV
# op fails at runtime.

[[kv_namespaces]]
binding = "TAV_INTEL_KV"
id         = "REPLACE_WITH_TAV_INTEL_KV_PREVIEW_ID"
preview_id = "REPLACE_WITH_TAV_INTEL_KV_PREVIEW_ID"

[vars]
# Comma-separated email allowlist for force_refresh (temporary; see
# docs/INTELLIGENCE_CONTRACTS.md §D). Empty string = no email-based bypass.
MANAGER_EMAIL_ALLOWLIST = ""

# ── Staging ──────────────────────────────────────────────────────────────────

[env.staging]
name = "tav-intelligence-worker-staging"

[[env.staging.kv_namespaces]]
binding = "TAV_INTEL_KV"
id      = "REPLACE_WITH_TAV_INTEL_KV_STAGING_ID"

[env.staging.vars]
MANAGER_EMAIL_ALLOWLIST = ""

# ── Production ───────────────────────────────────────────────────────────────

[env.production]
name = "tav-intelligence-worker-production"

[[env.production.kv_namespaces]]
binding = "TAV_INTEL_KV"
id      = "REPLACE_WITH_TAV_INTEL_KV_PRODUCTION_ID"

[env.production.vars]
MANAGER_EMAIL_ALLOWLIST = ""

# ── Manheim secrets (set in Phase G) ─────────────────────────────────────────
#
# Decision (locked 2026-05-07): same Manheim credentials as the main
# tav-aip worker. Cloudflare secrets are per-Worker, so the values must be
# set on this Worker too — but they are the SAME values currently set on
# tav-aip. For each of the six secrets, run on each env:
#
#   wrangler secret put MANHEIM_CLIENT_ID     --config workers/tav-intelligence-worker/wrangler.toml --env staging
#   wrangler secret put MANHEIM_CLIENT_SECRET --config workers/tav-intelligence-worker/wrangler.toml --env staging
#   wrangler secret put MANHEIM_USERNAME      --config workers/tav-intelligence-worker/wrangler.toml --env staging
#   wrangler secret put MANHEIM_PASSWORD      --config workers/tav-intelligence-worker/wrangler.toml --env staging
#   wrangler secret put MANHEIM_TOKEN_URL     --config workers/tav-intelligence-worker/wrangler.toml --env staging
#   wrangler secret put MANHEIM_MMR_URL       --config workers/tav-intelligence-worker/wrangler.toml --env staging
#
# Repeat with --env production. The MANHEIM_* fields will be added to
# src/types/env.ts when the Manheim client implementation lands in Phase G.
