name: Deploy (staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Wrangler deploy
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    needs: []
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_HEALTH_URL: ${{ vars.STAGING_HEALTH_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for Node project
        id: node_project
        run: |
          if [[ -f package.json && -f package-lock.json ]]; then
            echo "has_node_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node_project=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.node_project.outputs.has_node_project == 'true'
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        if: steps.node_project.outputs.has_node_project == 'true'
        run: npm ci

      - name: Lint
        if: steps.node_project.outputs.has_node_project == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.node_project.outputs.has_node_project == 'true'
        run: npm run typecheck

      - name: Test
        if: steps.node_project.outputs.has_node_project == 'true'
        run: npm test -- --run

      - name: Verify deploy prerequisites
        if: steps.node_project.outputs.has_node_project == 'true'
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" ]]; then
            echo "::notice::Skipping deploy: CLOUDFLARE_API_TOKEN is not configured"
            echo "should_deploy=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::notice::Skipping deploy: CLOUDFLARE_ACCOUNT_ID is not configured"
            echo "should_deploy=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -z "$STAGING_HEALTH_URL" ]]; then
            echo "::notice::Skipping health check: STAGING_HEALTH_URL is not configured"
            echo "should_healthcheck=false" >> "$GITHUB_ENV"
          else
            echo "should_healthcheck=true" >> "$GITHUB_ENV"
          fi

          echo "should_deploy=true" >> "$GITHUB_ENV"

      - name: Wrangler deploy
        if: steps.node_project.outputs.has_node_project == 'true' && env.should_deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

      - name: Post-deploy /health check
        if: steps.node_project.outputs.has_node_project == 'true' && env.should_deploy == 'true' && env.should_healthcheck == 'true'
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "$STAGING_HEALTH_URL" | grep -q '"ok":true'; then
              echo "health: ok"
              exit 0
            fi
            sleep 5
          done
          echo "::error::/health did not return ok within 25s"
          exit 1