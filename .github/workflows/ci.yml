name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: ${{ hashFiles('package.json') != '' && hashFiles('package-lock.json') != '' }}
    name: Verification Loop (lint → typecheck → vitest → integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Vitest (unit)
        run: npm test -- --run --reporter=default

      - name: Detect integration trigger paths
        id: trigger
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | \
             grep -E '^(src/(persistence|valuation|sources)/|supabase/migrations/)' >/dev/null; then
            echo "needs_integ=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_integ=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Integration tests
        if: steps.trigger.outputs.needs_integ == 'true'
        run: npm run test:int

  secret-scan:
    name: Secret-leak guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refuse committed secrets
        run: |
          set -e
          PATTERN='^(SUPABASE_SERVICE_ROLE_KEY|WEBHOOK_HMAC_SECRET|NORMALIZER_SECRET|MANHEIM_(CLIENT_SECRET|PASSWORD)|TWILIO_AUTH_TOKEN)='
          OFFENDERS=$(git grep -nE "$PATTERN" -- ':!.dev.vars.example' ':!docs/' ':!.github/' || true)
          BAD_EXAMPLE=$(grep -nE "$PATTERN" .dev.vars.example 2>/dev/null | grep -vE '=replace_me$' || true)
          if [[ -n "$OFFENDERS" || -n "$BAD_EXAMPLE" ]]; then
            echo "::error::Possible committed secret detected"
            [[ -n "$OFFENDERS" ]] && echo "$OFFENDERS"
            [[ -n "$BAD_EXAMPLE" ]] && echo ".dev.vars.example has non-placeholder value: $BAD_EXAMPLE"
            exit 1
          fi
          echo "secret-scan: clean"

      - name: Refuse .dev.vars in tree
        run: |
          if git ls-files | grep -E '^\.dev\.vars$' >/dev/null; then
            echo "::error::.dev.vars must never be committed"
            exit 1
          fi

  tav-gates:
    name: TAV gates (no-VIN, reason-codes, stale intact)
    